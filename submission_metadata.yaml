ai_usage_summary: |
  Claude (Opus via Claude Code) used for the data audit, architecture, and code.
  An open-weight LLM on Nebius is used OFFLINE as a labeling "teacher"; no hosted
  LLM is called during the ranking step. No candidate PII is sent anywhere
  (profiles are anonymized in the dataset).

methodology_summary: |
  Parakh ranks by *assaying* profiles, not matching keywords. An Integrity Gate
  rejects honeypots (expert-skill-with-0-months; tenure exceeding career) and
  keyword-stuffers (AI skills with no supporting career evidence). A transparent,
  JD-derived rubric scores role fit, free-text evidence of building
  retrieval/ranking/recommendation systems, must-have signals (embeddings, vector
  DBs, ranking eval), experience band, product-vs-services, and location, then
  modulates by behavioral availability. (Learned LightGBM ranker distilled from an
  offline LLM teacher is layered on top; the ranking step stays CPU-only/offline.)

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: false   # TODO set true after local CPU timing check

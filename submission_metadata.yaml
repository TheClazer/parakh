  - "Nebius"        # Qwen3-235B (teacher) + DeepSeek-V4 (2nd judge), OFFLINE only

ai_usage_summary: |
  Claude (Opus via Claude Code) used for the data audit, architecture, and code.
  An open-weight LLM on Nebius is used OFFLINE as a labeling "teacher"; no hosted
  LLM is called during the ranking step. No candidate PII is sent anywhere
  (profiles are anonymized in the dataset).

methodology_summary: |
  Parakh ranks by *assaying* profiles, not matching keywords. (1) An Integrity
  Gate rejects honeypots (expert-skill-with-0-months, tenure>career,
  active-before-signup) and keyword-stuffers (AI skills without supporting
  career narrative). (2) A transparent JD-derived rubric scores every one of the
  100k candidates: narrative evidence of retrieval/ranking/recsys work,
  must-haves (embeddings, vector DBs, ranking eval), experience band,
  product-vs-services, location, and a behavioral-availability multiplier.
  (3) Offline, two independent frontier teachers (DeepSeek-V4, Qwen3-235B on
  Nebius) grade ~5.5k plausible candidates - the rule shortlist PLUS a
  recall-rescue sweep that catches plain-language gems the rules under-rank -
  and a third judge (Kimi-K2.6) re-grades the contested top; the final score
  averages the judges, so only cross-model agreement reaches the top-10.
  (4) Reasons are regenerated grounded-and-verified against each profile.
  All model calls are pre-compute; the ranking step reads cached artifacts and
  runs CPU-only, offline, in ~3 minutes.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true    # rank.py runs offline on CPU in ~3 min; validator passes
